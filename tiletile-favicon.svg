<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>TileTile Favicon</title>
  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="6" ry="6" fill="#1a1a1a"/>
  <!-- Outer hexagon stroke -->
  <polygon
    points="16,4 26.4,9.5 26.4,22.5 16,28 5.6,22.5 5.6,9.5"
    fill="none"
    stroke="#C8FF00"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Inner hexagon (smaller, subtle fill) -->
  <polygon
    points="16,9.5 22,12.75 22,19.25 16,22.5 10,19.25 10,12.75"
    fill="#C8FF00"
    opacity="0.15"
    stroke="#C8FF00"
    stroke-width="1"
    stroke-linejoin="round"
  />
</svg>
